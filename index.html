<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Agent Dashboard</title>

    <!-- Fonts: Distinctive editorial choice -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Satoshi:wght@400;500;700&display=swap"
        rel="stylesheet">

    <!-- React & Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.min.js"></script>

    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-elevated: #1a1a1a;
            --text-primary: #fafafa;
            --text-secondary: #a0a0a0;
            --text-muted: #666;
            --accent: #ff6b35;
            --accent-glow: rgba(255, 107, 53, 0.15);
            --success: #4ade80;
            --error: #f87171;
            --border: #2a2a2a;
            --gradient-accent: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1000;
        }

        /* Typography */
        .font-serif {
            font-family: 'Instrument Serif', Georgia, serif;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Header */
        .header {
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 0;
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            z-index: 100;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
        }

        .logo-text {
            font-family: 'Instrument Serif', serif;
            font-size: 1.75rem;
            font-weight: 400;
            letter-spacing: -0.02em;
        }

        .logo-badge {
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.25rem 0.5rem;
            background: var(--gradient-accent);
            border-radius: 2px;
            color: white;
        }

        /* Navigation */
        .nav {
            display: flex;
            gap: 0.5rem;
        }

        .nav-btn {
            padding: 0.625rem 1.25rem;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 4px;
        }

        .nav-btn:hover {
            border-color: var(--text-muted);
            color: var(--text-primary);
        }

        .nav-btn.active {
            background: var(--text-primary);
            color: var(--bg-primary);
            border-color: var(--text-primary);
        }

        /* Main content */
        .main {
            padding: 3rem 0;
            min-height: calc(100vh - 80px);
        }

        /* Section headers */
        .section-header {
            margin-bottom: 2rem;
        }

        .section-title {
            font-family: 'Instrument Serif', serif;
            font-size: 2.5rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .section-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* Chat interface */
        .chat-container {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 2rem;
            height: calc(100vh - 200px);
            min-height: 500px;
        }

        .chat-main {
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 8px;
            animation: fadeSlideIn 0.3s ease;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            background: var(--accent);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }

        .message.assistant {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-bottom-left-radius: 2px;
        }

        .message-content {
            white-space: pre-wrap;
        }

        .message-tools {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .tool-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.5rem;
            background: rgba(255, 107, 53, 0.1);
            border: 1px solid rgba(255, 107, 53, 0.3);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent);
            margin-right: 0.5rem;
        }

        .chat-input-container {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            background: var(--bg-elevated);
        }

        .chat-input-wrapper {
            display: flex;
            gap: 0.75rem;
        }

        .chat-input {
            flex: 1;
            padding: 0.875rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .chat-input:focus {
            border-color: var(--accent);
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            padding: 0.875rem 1.5rem;
            background: var(--gradient-accent);
            border: none;
            border-radius: 6px;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Chat sidebar */
        .chat-sidebar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .sidebar-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
        }

        .sidebar-title {
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            color: var(--accent);
        }

        /* Evaluation view */
        .eval-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .metric-card:hover {
            transform: translateY(-2px);
            border-color: var(--text-muted);
        }

        .metric-label {
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .metric-value {
            font-family: 'Instrument Serif', serif;
            font-size: 3rem;
            line-height: 1.1;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .metric-detail {
            margin-top: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        /* Charts */
        .chart-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-title {
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        /* Results table */
        .results-table {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .table-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 80px;
            gap: 1rem;
            padding: 1rem 1.5rem;
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        .table-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 80px;
            gap: 1rem;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            align-items: center;
            transition: background 0.15s ease;
        }

        .table-row:last-child {
            border-bottom: none;
        }

        .table-row:hover {
            background: var(--bg-elevated);
        }

        .question-cell {
            font-size: 0.9rem;
        }

        .category-badge {
            display: inline-block;
            padding: 0.25rem 0.625rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .score-cell {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            padding: 0.35rem 0;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-badge.pass {
            background: rgba(74, 222, 128, 0.15);
            color: var(--success);
        }

        .status-badge.fail {
            background: rgba(248, 113, 113, 0.15);
            color: var(--error);
        }

        /* Run evaluation button */
        .run-eval-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.5rem;
            background: var(--gradient-accent);
            border: none;
            border-radius: 6px;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
            margin-bottom: 2rem;
        }

        .run-eval-btn:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .run-eval-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Loading spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        /* Config notice */
        .config-notice {
            background: rgba(255, 107, 53, 0.1);
            border: 1px solid rgba(255, 107, 53, 0.3);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            color: var(--accent);
        }

        .config-notice code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .chat-container {
                grid-template-columns: 1fr;
            }

            .chat-sidebar {
                display: none;
            }

            .table-header,
            .table-row {
                grid-template-columns: 1fr 1fr;
            }

            .table-header>*:nth-child(3),
            .table-row>*:nth-child(3) {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>


    <script type="text/babel" data-presets="env,react">
        const { useState, useEffect, useRef } = React;
        const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Cell } = Recharts;

        // API base URL - empty string means same origin (port 3000)
        const API_BASE = '';

        // ============================================================================
        // MAIN APP COMPONENT
        // ============================================================================
        function App() {
            const [currentView, setCurrentView] = useState('chat');

            return (
                <div className="app">
                    <Header currentView={currentView} setCurrentView={setCurrentView} />
                    <main className="main">
                        <div className="container">
                            {currentView === 'chat' && <ChatView />}
                            {currentView === 'evaluation' && <EvaluationView />}
                        </div>
                    </main>
                </div>
            );
        }

        // ============================================================================
        // HEADER COMPONENT
        // ============================================================================
        function Header({ currentView, setCurrentView }) {
            return (
                <header className="header">
                    <div className="container header-inner">
                        <div className="logo">
                            <span className="logo-text">QA Agent</span>
                            <span className="logo-badge">Beta</span>
                        </div>
                        <nav className="nav">
                            <button
                                className={`nav-btn ${currentView === 'chat' ? 'active' : ''}`}
                                onClick={() => setCurrentView('chat')}
                            >
                                Chat
                            </button>
                            <button
                                className={`nav-btn ${currentView === 'evaluation' ? 'active' : ''}`}
                                onClick={() => setCurrentView('evaluation')}
                            >
                                Evaluation
                            </button>
                        </nav>
                    </div>
                </header>
            );
        }

        // ============================================================================
        // CHAT VIEW COMPONENT
        // This is where users interact with the chatbot in real-time
        // ============================================================================
        function ChatView() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [sessionId, setSessionId] = useState(null);
            const [stats, setStats] = useState({ messages: 0, toolCalls: 0 });
            const messagesEndRef = useRef(null);

            // Auto-scroll to bottom when new messages arrive
            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const sendMessage = async () => {
                if (!input.trim() || loading) return;

                const userMessage = input.trim();
                setInput('');
                setLoading(true);

                // Add user message immediately for instant feedback
                setMessages(prev => [...prev, { role: 'user', content: userMessage }]);

                try {
                    const response = await fetch(`${API_BASE}/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: userMessage,
                            session_id: sessionId
                        })
                    });

                    if (!response.ok) throw new Error('API request failed');

                    const data = await response.json();

                    // Add assistant response
                    setMessages(prev => [...prev, {
                        role: 'assistant',
                        content: data.response,
                        toolCalls: data.tool_calls
                    }]);

                    // Update session ID and stats
                    setSessionId(data.session_id);
                    setStats(prev => ({
                        messages: prev.messages + 2,
                        toolCalls: prev.toolCalls + (data.tool_calls?.length || 0)
                    }));

                } catch (error) {
                    console.error('Error:', error);
                    setMessages(prev => [...prev, {
                        role: 'assistant',
                        content: 'Sorry, I encountered an error. Please make sure the backend server is running.',
                        error: true
                    }]);
                }

                setLoading(false);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };

            return (
                <>
                    <div className="section-header">
                        <h1 className="section-title font-serif">Chat with the Agent</h1>
                        <p className="section-subtitle">Ask questions and watch the agent use tools to find answers</p>
                    </div>

                    <div className="config-notice">
                        Make sure the backend is running: <code>python server.py</code>
                    </div>

                    <div className="chat-container">
                        <div className="chat-main">
                            <div className="chat-messages">
                                {messages.length === 0 && (
                                    <div className="empty-state">
                                        <div className="empty-state-icon">💬</div>
                                        <p>Start a conversation by typing a message below.</p>
                                        <p style={{ marginTop: '0.5rem', fontSize: '0.85rem' }}>
                                            Try asking: "What is 25% of 840?" or "What's the weather like?"
                                        </p>
                                    </div>
                                )}
                                {messages.map((msg, idx) => (
                                    <div key={idx} className={`message ${msg.role}`}>
                                        <div className="message-content">{msg.content}</div>
                                        {msg.toolCalls && msg.toolCalls.length > 0 && (
                                            <div className="message-tools">
                                                <span style={{ marginRight: '0.5rem' }}>Tools used:</span>
                                                {msg.toolCalls.map((tc, i) => (
                                                    <span key={i} className="tool-badge">
                                                        ⚡ {tc.tool}
                                                    </span>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                ))}
                                {loading && (
                                    <div className="message assistant">
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                            <div className="spinner"></div>
                                            <span style={{ color: 'var(--text-muted)' }}>Thinking...</span>
                                        </div>
                                    </div>
                                )}
                                <div ref={messagesEndRef} />
                            </div>
                            <div className="chat-input-container">
                                <div className="chat-input-wrapper">
                                    <input
                                        type="text"
                                        className="chat-input"
                                        placeholder="Ask me anything..."
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                        onKeyPress={handleKeyPress}
                                        disabled={loading}
                                    />
                                    <button
                                        className="send-btn"
                                        onClick={sendMessage}
                                        disabled={loading || !input.trim()}
                                    >
                                        Send
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="chat-sidebar">
                            <div className="sidebar-card">
                                <div className="sidebar-title">Session Stats</div>
                                <div className="stat-row">
                                    <span className="stat-label">Messages</span>
                                    <span className="stat-value">{stats.messages}</span>
                                </div>
                                <div className="stat-row">
                                    <span className="stat-label">Tool Calls</span>
                                    <span className="stat-value">{stats.toolCalls}</span>
                                </div>
                                <div className="stat-row">
                                    <span className="stat-label">Session ID</span>
                                    <span className="stat-value" style={{ fontSize: '0.7rem' }}>
                                        {sessionId || '—'}
                                    </span>
                                </div>
                            </div>

                            <div className="sidebar-card">
                                <div className="sidebar-title">Available Tools</div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                                    <div className="tool-badge" style={{ justifyContent: 'flex-start' }}>
                                        🔍 web_search
                                    </div>
                                    <div className="tool-badge" style={{ justifyContent: 'flex-start' }}>
                                        🧮 calculator
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </>
            );
        }

        // ============================================================================
        // EVALUATION VIEW COMPONENT
        // Shows evaluation metrics, charts, and detailed results
        // ============================================================================
        function EvaluationView() {
            const [results, setResults] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            // Load existing results on mount
            useEffect(() => {
                fetchResults();
            }, []);

            const fetchResults = async () => {
                try {
                    const response = await fetch(`${API_BASE}/evaluation-results`);
                    if (response.ok) {
                        const data = await response.json();
                        if (data.summary) {
                            setResults(data);
                        }
                    }
                } catch (err) {
                    console.log('No existing results found');
                }
            };

            const runEvaluation = async () => {
                setLoading(true);
                setError(null);

                try {
                    const response = await fetch(`${API_BASE}/evaluate`, {
                        method: 'POST'
                    });

                    if (!response.ok) throw new Error('Evaluation failed');

                    const data = await response.json();
                    setResults(data);
                } catch (err) {
                    setError(err.message);
                }

                setLoading(false);
            };

            // Prepare chart data from category breakdown
            const chartData = results?.summary?.category_breakdown
                ? Object.entries(results.summary.category_breakdown).map(([name, data]) => ({
                    name,
                    score: data.avg_score,
                    accuracy: Math.round(data.accuracy * 100)
                }))
                : [];

            return (
                <>
                    <div className="section-header">
                        <h1 className="section-title font-serif">Evaluation Dashboard</h1>
                        <p className="section-subtitle">Measure and analyze chatbot performance</p>
                    </div>

                    <div className="config-notice">
                        Running evaluation takes ~30-60 seconds as it tests 10 questions and judges each response.
                    </div>

                    <button
                        className="run-eval-btn"
                        onClick={runEvaluation}
                        disabled={loading}
                    >
                        {loading ? (
                            <>
                                <div className="spinner"></div>
                                Running Evaluation...
                            </>
                        ) : (
                            <>
                                ▶ Run Evaluation
                            </>
                        )}
                    </button>

                    {error && (
                        <div className="config-notice" style={{ borderColor: 'var(--error)', color: 'var(--error)' }}>
                            Error: {error}. Make sure the backend server is running.
                        </div>
                    )}

                    {results ? (
                        <>
                            {/* Summary Metrics */}
                            <div className="eval-grid">
                                <div className="metric-card">
                                    <div className="metric-label">Accuracy</div>
                                    <div className="metric-value">
                                        {Math.round(results.summary.accuracy * 100)}%
                                    </div>
                                    <div className="metric-detail">
                                        {results.summary.passed}/{results.summary.total_tests} tests passed
                                    </div>
                                </div>

                                <div className="metric-card">
                                    <div className="metric-label">Average Score</div>
                                    <div className="metric-value">
                                        {results.summary.average_score.toFixed(2)}
                                    </div>
                                    <div className="metric-detail">
                                        Out of 5.0 possible
                                    </div>
                                </div>

                                <div className="metric-card">
                                    <div className="metric-label">Tool Accuracy</div>
                                    <div className="metric-value">
                                        {Math.round(results.summary.tool_accuracy * 100)}%
                                    </div>
                                    <div className="metric-detail">
                                        Correct tool selection rate
                                    </div>
                                </div>
                            </div>

                            {/* Category Chart */}
                            {chartData.length > 0 && (
                                <div className="chart-container">
                                    <div className="chart-title">Score by Category</div>
                                    <ResponsiveContainer width="100%" height={250}>
                                        <BarChart data={chartData} layout="vertical">
                                            <XAxis type="number" domain={[0, 5]} stroke="#666" />
                                            <YAxis type="category" dataKey="name" width={100} stroke="#666" />
                                            <Tooltip
                                                contentStyle={{
                                                    background: '#1a1a1a',
                                                    border: '1px solid #2a2a2a',
                                                    borderRadius: '4px'
                                                }}
                                                formatter={(value) => [value.toFixed(2), 'Avg Score']}
                                            />
                                            <Bar dataKey="score" radius={[0, 4, 4, 0]}>
                                                {chartData.map((entry, index) => (
                                                    <Cell
                                                        key={index}
                                                        fill={entry.score >= 3.5 ? '#4ade80' : '#ff6b35'}
                                                    />
                                                ))}
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            )}

                            {/* Results Table */}
                            <div className="results-table">
                                <div className="table-header">
                                    <div>Question</div>
                                    <div>Category</div>
                                    <div>Score</div>
                                    <div>Status</div>
                                </div>
                                {results.results.map((result, idx) => (
                                    <div key={idx} className="table-row">
                                        <div className="question-cell">{result.question}</div>
                                        <div>
                                            <span className="category-badge">{result.category}</span>
                                        </div>
                                        <div className="score-cell">
                                            {result.scores?.overall_score?.toFixed(2) || '—'}
                                        </div>
                                        <div>
                                            <span className={`status-badge ${result.passed ? 'pass' : 'fail'}`}>
                                                {result.passed ? 'Pass' : 'Fail'}
                                            </span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </>
                    ) : (
                        <div className="empty-state" style={{ background: 'var(--bg-secondary)', borderRadius: '8px' }}>
                            <div className="empty-state-icon">📊</div>
                            <p>No evaluation results yet.</p>
                            <p style={{ marginTop: '0.5rem', fontSize: '0.85rem' }}>
                                Click "Run Evaluation" to test the chatbot's performance.
                            </p>
                        </div>
                    )}
                </>
            );
        }

        // ============================================================================
        // RENDER THE APP
        // ============================================================================
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>

</html>
